name: Beta Release builds

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  changelog:
    name: Beta Release Changelog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve previous beta tag
        run: |
          set -e
          PREV_BETA_SHA=$(git ls-remote --tags origin refs/tags/beta | awk '{print $1}')
          echo "PREV_BETA_SHA=$PREV_BETA_SHA" >> $GITHUB_ENV
          if [ -n "$PREV_BETA_SHA" ]; then
            echo "Found previous beta tag at: $PREV_BETA_SHA"
          else
            echo "No previous beta tag found"
          fi

      - name: Create or update ref
        id: create-or-update-ref
        uses: ovsds/create-or-update-ref-action@v1
        with:
          ref: tags/beta
          sha: ${{ github.sha }}

      - name: Generate changelog from previous beta
        id: changelog
        run: |
          set -e
          changes_file=.changes.tmp
          range=""

          if [ -n "$PREV_BETA_SHA" ]; then
            range="$PREV_BETA_SHA..$GITHUB_SHA"
            git log --no-merges --pretty="- %s (%h)" "$range" > "$changes_file" || true
          else
            git log --no-merges -n 30 --pretty="- %s (%h)" > "$changes_file" || true
          fi

          {
            echo "# Beta Changelog"
            echo
            if [ -n "$range" ]; then
              echo "Range: $range"
            else
              echo "Range: latest 30 commits (no previous beta tag)"
            fi
            echo
            if [ -s "$changes_file" ]; then
              cat "$changes_file"
            else
              echo "- No user-facing changes in this range"
            fi
          } > CHANGELOG.md

          rm -f "$changes_file"

      - name: Upload assets to beta release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view beta; then
            gh release create beta --prerelease --notes-file CHANGELOG.md
          else
            gh release edit beta --prerelease --notes-file CHANGELOG.md
          fi
          gh release upload beta "CHANGELOG.md" --clobber

      - name: Upload assets to github artifact
        uses: actions/upload-artifact@v7
        with:
          name: beta changelog
          path: ${{ github.workspace }}/CHANGELOG.md
          compression-level: 0
          if-no-files-found: error # 'warn' or 'ignore' are also available, defaults to `warn`

  release:
    needs:
      - changelog
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: "linux-amd64" # xgo linux-amd64
            hash: "md5-linux-amd64"
            flags: ""
            goflags: ""
          - target: "linux-arm64" # xgo linux-arm64
            hash: "md5-linux-arm64"
            flags: ""
            goflags: ""
          - target: "darwin-amd64" # xgo darwin-amd64
            hash: "md5-darwin-amd64"
            flags: ""
            goflags: ""
          - target: "darwin-arm64" # xgo darwin-arm64
            hash: "md5-darwin-arm64"
            flags: ""
            goflags: ""
          - target: "windows-amd64" # xgo windows-amd64
            hash: "md5-windows-amd64"
            flags: ""
            goflags: ""
          - target: "linux-amd64-musl" # musl linux-amd64
            hash: "md5-linux-musl-amd64"
            flags: "-ldflags=-linkmode external -extldflags '-static -fpic'"
            goflags: ""
            musl_static: "true"
          - target: "linux-arm64-musl" # musl linux-arm64
            hash: "md5-linux-musl-arm64"
            flags: "-ldflags=-linkmode external -extldflags '-static -fpic'"
            goflags: ""
            musl_static: "true"
          - target: "windows-arm64" #win-arm64
            hash: "md5-windows-arm64"
            flags: ""
            goflags: ""
            musl_static: "false"
          - target: "windows7-*" #win7
            hash: "md5-windows7"
            flags: ""
            goflags: "-tags=sqlite_cgo_compat"
            musl_static: "false"
          - target: "android-*" #android
            hash: "md5-android"
            flags: ""
            goflags: ""
            musl_static: "false"

    name: Beta Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version: "1.26.4"

      - name: Setup web
        run: bash build.sh dev web
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FRONTEND_REPO: ${{ vars.FRONTEND_REPO }}

      - name: Build
        uses: OpenListTeam/cgo-actions@v1.2.5
        with:
          targets: ${{ matrix.target }}
          flags: ${{ matrix.flags || '-ldflags=' }}
          static-link-for-musl: true
          musl-target-format: $os-$musl-$arch
          github-token: ${{ secrets.GITHUB_TOKEN }}
          out-dir: build
          output: openlist-$target$ext
          musl-base-url: "https://github.com/OpenListTeam/musl-compilers/releases/latest/download/"
          x-flags: |
            github.com/OpenListTeam/OpenList/v4/internal/conf.BuiltAt=$built_at
            github.com/OpenListTeam/OpenList/v4/internal/conf.GitAuthor=Xiaraon Studio <noreply@xrgzs.top>
            github.com/OpenListTeam/OpenList/v4/internal/conf.GitCommit=$git_commit
            github.com/OpenListTeam/OpenList/v4/internal/conf.Version=$tag
            github.com/OpenListTeam/OpenList/v4/internal/conf.WebVersion=rolling
        env:
          GOFLAGS: ${{ matrix.goflags }}

      - name: Verify musl binaries are static
        if: matrix.musl_static == 'true'
        run: |
          set -e
          shopt -s nullglob
          files=(build/openlist-*-musl-*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No musl binaries found"
            exit 1
          fi
          for f in "${files[@]}"; do
            if readelf -l "$f" | grep -q "Requesting program interpreter"; then
              echo "Dynamic binary detected: $f"
              readelf -l "$f" | grep "Requesting program interpreter" || true
              exit 1
            fi
          done

      - name: Compress
        run: |
          bash build.sh zip ${{ matrix.hash }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload assets to beta release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for file in build/compress/*; do
            gh release upload beta "$file" --clobber
          done

      - name: Clean illegal characters from matrix.target
        id: clean_target_name
        run: |
          ILLEGAL_CHARS_REGEX='[":<>|*?\\/\r\n]'
          CLEANED_TARGET=$(echo "${{ matrix.target }}" | sed -E "s/$ILLEGAL_CHARS_REGEX//g")
          echo "Original target: ${{ matrix.target }}"
          echo "Cleaned target: $CLEANED_TARGET"
          echo "cleaned_target=$CLEANED_TARGET" >> $GITHUB_ENV

      - name: Upload assets to github artifact
        uses: actions/upload-artifact@v7
        with:
          name: beta builds for ${{ env.cleaned_target }}
          path: ${{ github.workspace }}/build/compress/*
          compression-level: 0
          if-no-files-found: error # 'warn' or 'ignore' are also available, defaults to `warn`
